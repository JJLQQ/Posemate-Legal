<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJAQQ Studio - Official Website</title>
    <style>
        /* 延续极简粉色调，融合你的 App 原生图标 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            background-color: #fcf9f9; 
        }
        .container { 
            background: #fff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        h1 { 
            color: #111; 
            font-size: 28px; 
            text-align: center; 
            margin-bottom: 5px; 
        }
        .studio-tag { 
            text-align: center; 
            color: #888; 
            font-size: 14px; 
            margin-bottom: 40px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 15px; 
        }
        
        .section-title { 
            font-size: 14px; 
            font-weight: bold; 
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 30px; 
            margin-bottom: 15px; 
        }
        
        /* App 卡片排版 */
        .app-card { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            padding: 20px; 
            border: 1px solid #f5f5f5; 
            border-radius: 16px; 
            background-color: #fafafa; 
            margin-bottom: 20px; 
        }
        
        /* 原生图片图标样式：带圆角和微妙阴影 */
        .app-icon-img { 
            width: 70px; 
            height: 70px; 
            border-radius: 16px; 
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08); 
        }
        
        .app-info { 
            flex: 1; 
            text-align: left; 
        }
        .app-name { 
            font-size: 18px; 
            font-weight: bold; 
            color: #111; 
            margin: 0; 
        }
        .app-desc { 
            font-size: 13px; 
            color: #666; 
            margin: 2px 0 10px; 
        }
        .links { 
            display: flex; 
            gap: 15px; 
        }
        .links a { 
            color: #ff69b4; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: bold; 
        }
        .links a:hover {
            text-decoration: underline;
        }
        
        .contact-box { 
            background: #fafafa; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #f5f5f5; 
            text-align: center; 
            font-size: 14px; 
        }
        .footer { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 12px; 
            color: #ccc; 
        }
    </style>
</head>
<body>
<div class="container">
    <h1>JJAQQ Studio</h1>
    <div class="studio-tag">Crafting Beautiful & Useful Indie Apps</div>

    <div class="section-title">Our Applications / 旗下应用</div>
    
    <div class="app-card">
        <img src="/posemate_icon_1024.jpg" class="app-icon-img" alt="PoseMate Icon">
        <div class="app-info">
            <h3 class="app-name">PoseMate</h3>
            <p class="app-desc">Copy any photo & master your drawing or photography poses.</p>
            <div class="links">
                <a href="/posemate/privacy.html">Privacy / 隐私政策</a>
                <a href="/posemate/terms.html">Terms / 服务条款</a>
            </div>
        </div>
    </div>

    <div class="section-title">Support & Contact / 联系我们</div>
    <div class="contact-box">
        Email us at: <strong>yokonoayako1@gmail.com</strong>
    </div>
</div>
<div class="footer">
    &copy; 2026 JJAQQ Studio. All rights reserved.
</div>
</body>
</html>
